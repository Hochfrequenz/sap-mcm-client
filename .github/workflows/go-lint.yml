name: "Go Lint"

on:
  pull_request: {}

jobs:
  golangci:
    runs-on: ubuntu-latest
    name: lint
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - uses: actions/checkout@v7
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --enable dupl,goconst,gocyclo
      - name: fmt
        run: golangci-lint fmt --diff --enable gofmt
